# Frontend CI — type-checks and production-builds the Next.js app on every
# push/PR.
name: frontend-ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      # Lint gates the build. Fails only on eslint *errors* — the intentional
      # set-state-in-effect / incompatible-library patterns are warnings (see
      # eslint.config.mjs) and don't block CI.
      - name: Lint
        run: npm run lint
      # Build first: it generates next-env.d.ts (gitignored), which declares
      # the image-module types tsc needs. The build type-checks as it goes.
      - name: Build
        env:
          # Build-time stand-ins; real values come from the deployment platform.
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          CLERK_SECRET_KEY: sk_test_placeholder
        run: npm run build
      - name: Type-check
        run: npx tsc --noEmit
